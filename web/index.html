<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Tagesabrechnung für Kinokassen">

  <!-- Verhindert Browser-Caching von index.html — stellt sicher, dass immer die aktuelle Version geladen wird -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Kassenabrechnung">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Kassenabrechnung</title>
  <link rel="manifest" href="manifest.json">

  <!-- Fängt das beforeinstallprompt-Event ab, damit Flutter es programmatisch auslösen kann -->
  <script>
    window._pwaInstallEvent = null;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      window._pwaInstallEvent = e;
    });
  </script>
  <script>
    // Beim ersten Öffnen eines neuen Tabs: SW-Cache leeren + SW deregistrieren + neu laden.
    // sessionStorage verhindert eine Reload-Schleife (wird beim Tab-Schließen zurückgesetzt).
    if ('serviceWorker' in navigator && !sessionStorage.getItem('_swFreshLoaded')) {
      sessionStorage.setItem('_swFreshLoaded', '1');
      caches.keys().then(function(keys) {
        return Promise.all(keys.map(function(k) { return caches.delete(k); }));
      }).then(function() {
        return navigator.serviceWorker.getRegistrations();
      }).then(function(regs) {
        return Promise.all(regs.map(function(r) { return r.unregister(); }));
      }).then(function() {
        location.reload();
      });
    }
  </script>
  <script>
    var _swUpdateReady = false;
    var _hadController = !!(navigator.serviceWorker && navigator.serviceWorker.controller);
    function _reloadPage() { window.location.reload(); }
    if ('serviceWorker' in navigator) {
      // Primär: feuert wenn neuer SW via skipWaiting() die Kontrolle übernimmt (Flutter-Default)
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (_hadController) {
          _swUpdateReady = true;
        }
      });
      // Fallback für SWs ohne skipWaiting()
      navigator.serviceWorker.getRegistration().then(function(reg) {
        if (!reg) return;
        if (reg.waiting && navigator.serviceWorker.controller) {
          _swUpdateReady = true;
          return;
        }
        reg.addEventListener('updatefound', function() {
          var newWorker = reg.installing;
          if (!newWorker) return;
          newWorker.addEventListener('statechange', function() {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              _swUpdateReady = true;
            }
          });
        });
        reg.update().catch(function() {});
        // Periodisch prüfen — neue Version könnte während die App offen ist deployed werden
        setInterval(function() { reg.update().catch(function() {}); }, 3600000);
      });
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
